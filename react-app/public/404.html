<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>KENREN</title>
    <script>
      // GitHub Pages SPA fallback (rafgraph/spa-github-pages)
      // Reescreve a URL para o index.html da SPA mantendo a rota original.
      var segmentCount = 1; // /kenren-site-1/ — 1 segmento antes da rota da app
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
