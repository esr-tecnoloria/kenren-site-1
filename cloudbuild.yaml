# Cloud Build pipeline for the Kenren API.
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml .
#
# Steps: build container, push to Artifact Registry, deploy to Cloud Run.
# Migrations are applied separately (see infra/README.md).

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - southamerica-east1-docker.pkg.dev/${PROJECT_ID}/kenren/api:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, 'southamerica-east1-docker.pkg.dev/${PROJECT_ID}/kenren/api:latest']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=southamerica-east1-docker.pkg.dev/${PROJECT_ID}/kenren/api:latest
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --add-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}
      - --set-env-vars=^|^FIREBASE_PROJECT_ID=${PROJECT_ID}|GCS_BUCKET=${_GCS_BUCKET}|NODE_ENV=production|LOG_LEVEL=info|CORS_ORIGINS=https://kenren.web.app,https://kenren-admin.web.app,http://localhost:5173,http://localhost:5174
      - --set-secrets=DATABASE_URL=database-url:latest
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080

images:
  - southamerica-east1-docker.pkg.dev/${PROJECT_ID}/kenren/api:latest

substitutions:
  _SERVICE: kenren-api
  _REGION: southamerica-east1
  _DB_INSTANCE: kenren-db
  _GCS_BUCKET: kenren-media
  _SA: api-runtime@guia-do-festival-do-japao.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
